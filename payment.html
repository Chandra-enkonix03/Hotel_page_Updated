<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StayEase | Secure Payment</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">StayEase</a>
        </div>
    </nav>

    <div class="container my-5" style="max-width: 600px;">
        <div class="progress mb-4" style="height: 8px;">
            <div class="progress-bar bg-primary" role="progressbar" style="width: 75%"></div>
        </div>

        <div class="card shadow-sm">
            <div class="card-header bg-white py-3">
                <h4 class="mb-0 fw-bold">Secure Checkout</h4>
            </div>
            <div class="card-body p-4">
                <div class="alert alert-info d-flex justify-content-between align-items-center" role="alert">
                    <span>Total Due to Pay:</span>
                    <strong class="fs-5">$650.00</strong>
                </div>

                <form action="confirmation.html" method="GET">
                    <div class="mb-3">
                        <label class="form-label">Cardholder Name</label>
                        <input type="text" class="form-control" required placeholder="Full Name">
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">Card Number</label>
                        <input type="text" class="form-control" required placeholder="xxxx xxxx xxxx xxxx" maxlength="16">
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Expiration Date</label>
                            <input type="text" class="form-control" required placeholder="MM/YY" maxlength="5">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">CVV</label>
                            <input type="password" class="form-control" required placeholder="xxx" maxlength="3">
                        </div>
                    </div>

                    <div class="mt-4 d-flex justify-content-between">
                        <a href="guest.html" class="btn btn-outline-secondary">Back</a>
                        <button type="submit" class="btn btn-outline-success px-4">Pay & Confirm Booking</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <footer class="bg-primary text-white py-4 mt-5 text-center">
        <p class="mb-0">&copy; 2026 Nova Stay || All rights reserved.</p>
    </footer>
</body>
</html>
