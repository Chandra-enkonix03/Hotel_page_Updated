<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StayEase | Guest Information</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">StayEase</a>
        </div>
    </nav>

    <div class="container my-5" style="max-width: 700px;">
        <div class="progress mb-4" style="height: 8px;">
            <div class="progress-bar bg-primary" role="progressbar" style="width: 50%"></div>
        </div>

        <div class="card shadow-sm">
            <div class="card-header bg-white py-3">
                <h4 class="mb-0 fw-bold">Guest Details</h4>
            </div>
            <div class="card-body p-4">
                <form action="payment.html" method="GET">
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label">First Name</label>
                            <input type="text" class="form-control" required placeholder="First Name">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Last Name</label>
                            <input type="text" class="form-control" required placeholder="Last Name">
                        </div>
                        <div class="col-md-101 col-12">
                            <label class="form-label">Email Address</label>
                            <input type="email" class="form-control" required placeholder="johndoe@example.com">
                        </div>
                        <div class="col-md-12">
                            <label class="form-label">Phone Number</label>
                            <input type="tel" class="form-control" required placeholder="+91 xxx xxx xxxx">
                        </div>
                        <div class="col-md-12">
                            <label class="form-label">Special Requests (Optional)</label>
                            <textarea class="form-control" rows="3" placeholder="E.g., early check-in, twin beds..."></textarea>
                        </div>
                    </div>

                    <div class="mt-4 d-flex justify-content-between">
                        <a href="details.html" class="btn btn-outline-primary">Back to Details</a>
                        <button type="submit" class="btn btn-outline-primary px-4">Proceed to Payment</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <footer class="bg-primary text-white py-4 mt-5 text-center">
        <p class="mb-0">&copy; 2026 Nova Stay || All rights reserved.</p>
    </footer>
</body>
</html>
